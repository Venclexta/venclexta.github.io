      (() => {
        let storedTheme = null;
        try {
          storedTheme = localStorage.getItem("theme");

          storedTheme = null;
        }

        document.documentElement.dataset.theme = storedTheme || (prefersDark ? "dark" : "light");
      })();
    </script>
